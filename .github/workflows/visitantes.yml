name: Atualizar contagem de visitantes

on:
  schedule:
    - cron: "0 6 * * *"  # todos os dias às 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Consultar Cloudflare e gravar visitantes.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
        run: python atualizar_visitantes.py

      - name: Commit e push (se houver alterações)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add visitantes.json
          git diff --staged --quiet || git commit -m "chore: atualizar contagem de visitantes"
          git push
